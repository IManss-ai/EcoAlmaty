<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#d0e8d2;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Plus Jakarta Sans',sans-serif;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar { display:none; }
@keyframes breathe { 0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.35);opacity:0.7;} }
@keyframes slide-up-in { from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);} }
@keyframes stagger-in { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
@keyframes fade-in-quick { from{opacity:0;transform:scale(0.9);}to{opacity:1;transform:scale(1);} }
@keyframes badge-pop { 0%{transform:scale(0);opacity:0;}65%{transform:scale(1.15);opacity:1;}100%{transform:scale(1);opacity:1;} }
@keyframes slide-in-right { from{opacity:0;transform:translateX(26px);}to{opacity:1;transform:translateX(0);} }
@keyframes slide-in-left  { from{opacity:0;transform:translateX(-26px);}to{opacity:1;transform:translateX(0);} }
@keyframes logo-pulse { 0%{transform:scale(0.7);opacity:0;}50%{transform:scale(1.08);opacity:1;}100%{transform:scale(1);opacity:1;} }
@keyframes logo-text-in { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }
@keyframes loader-fade-out { from{opacity:1;}to{opacity:0;pointer-events:none;} }
@keyframes typing-cursor { 0%,100%{opacity:1;}50%{opacity:0;} }
@keyframes tab-fade-in { from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);} }
@keyframes share-pop { 0%{transform:scale(0.8);opacity:0;}100%{transform:scale(1);opacity:1;} }

<script type="text/babel">

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>

function t(key, lang) {
  const dict = T[lang] || T.en;
  return key.split('.').reduce((o,k) => o?.[k], dict) ?? key.split('.').reduce((o,k) => o?.[k], T.en) ?? key;
}

// ── Click sound utility ──────────────────────────────────────
const audioCtx = typeof AudioContext !== 'undefined' ? new AudioContext() : null;
function playClick() {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.value = 1200; osc.type = 'sine';
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
  osc.start(); osc.stop(audioCtx.currentTime + 0.06);
}

// ── AQI meta ──────────────────────────────────────────────────
function aqiMeta(v, lang) {
  const l = lang || 'en';
  if (v <= 50)  return { label:t('aqi.good',l),           color:'#3a9e50', emoji:'😊', msg:t('aqiMsg.good',l),           key:'good' };
  if (v <= 100) return { label:t('aqi.moderate',l),       color:'#c99010', emoji:'😐', msg:t('aqiMsg.moderate',l),       key:'moderate' };
  if (v <= 150) return { label:t('aqi.sensitive',l),      color:'#c96418', emoji:'😷', msg:t('aqiMsg.sensitive',l),      key:'sensitive' };
  if (v <= 200) return { label:t('aqi.unhealthy',l),      color:'#b83030', emoji:'🤢', msg:t('aqiMsg.unhealthy',l),      key:'unhealthy' };
  if (v <= 300) return { label:t('aqi.veryUnhealthy',l),  color:'#7c5cbf', emoji:'☠️', msg:t('aqiMsg.veryUnhealthy',l),  key:'veryUnhealthy' };
  return               { label:t('aqi.hazardous',l),      color:'#b04060', emoji:'🚨', msg:t('aqiMsg.hazardous',l),      key:'hazardous' };
}

// ── Hooks ─────────────────────────────────────────────────────
function useCountUp(target, ms = 1000) {
  const [v, setV] = useState(0);
  const r = useRef();
  useEffect(() => {
    let start = null;
    cancelAnimationFrame(r.current);
    const run = (ts) => {
      if (!start) start = ts;
      const pct = Math.min((ts - start) / ms, 1);
      setV(Math.round(target * (1 - Math.pow(1 - pct, 3))));
      if (pct < 1) r.current = requestAnimationFrame(run);
    };
    r.current = requestAnimationFrame(run);
    return () => cancelAnimationFrame(r.current);
  }, [target]);
  return v;
}

// ── Shared components ─────────────────────────────────────────
function Ring({ value, max=100, size=72, stroke=4, color, delay=0 }) {
  const dark = useTheme();
  const P = dark ? DARK : LIGHT;
  const [drawn, setDrawn] = useState(false);
  const r = (size - stroke*2)/2, circ = 2*Math.PI*r;
  useEffect(() => { const t = setTimeout(() => setDrawn(true), delay); return () => clearTimeout(t); }, [value, delay]);
  const fill = drawn ? (value/max)*circ : 0;
  return (
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={P.rule} strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color||P.lime} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={circ-fill} strokeLinecap="round"
        style={{transition:`stroke-dashoffset 1.1s cubic-bezier(0.34,1.4,0.64,1) ${delay}ms`}}/>
    </svg>
  );
}

function FlipNum({ v }) {
  const [disp, setDisp] = useState(v);
  const [flip, setFlip] = useState(false);
  useEffect(() => {
    if (v !== disp) { setFlip(true); setTimeout(() => { setDisp(v); setFlip(false); }, 180); }
  }, [v]);
  return <span style={{display:'inline-block', transform:flip?'translateY(-6px) scaleY(0.7)':'none', opacity:flip?0:1, transition:'all 0.18s ease'}}>{disp}</span>;
}

function Confetti({ active, onDone }) {
  const ref = useRef();
  useEffect(() => {
    if (!active || !ref.current) return;
    const c = ref.current, ctx = c.getContext('2d');
    c.width = 300; c.height = 180;
    const ps = Array.from({length:36}, () => ({
      x:150, y:90, vx:(Math.random()-0.5)*14, vy:(Math.random()-0.8)*12,
      color:['#3a8c50','#d4860e','#f0f4f0','#5e9e72'][Math.floor(Math.random()*4)],
      r:3+Math.random()*4, life:1,
    }));
    let raf;
    (function draw() {
      ctx.clearRect(0,0,300,180);
      let alive = false;
      ps.forEach(p => {
        p.x+=p.vx; p.vy+=0.45; p.y+=p.vy; p.life-=0.028;
        if(p.life<=0) return; alive=true;
        ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      });
      if(alive) raf=requestAnimationFrame(draw); else onDone&&onDone();
    })();
    return () => cancelAnimationFrame(raf);
  }, [active]);
  if (!active) return null;
  return <canvas ref={ref} style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',pointerEvents:'none',zIndex:10}}/>;
}

function LessonCards({ done, onDone }) {
  const dark = useTheme();
  const lang = useLang();
  const P = dark ? DARK : LIGHT;
  const [idx, setIdx] = useState(0);
  const [checkDrawn, setCheckDrawn] = useState(false);
  const [confetti, setConfetti] = useState(false);
  const [typing, setTyping] = useState(true);
  const [typedChars, setTypedChars] = useState(0);
  const lesson = LESSONS[idx];
  const isDone = done && idx === 0;

  // AI typing effect on first load
  useEffect(() => {
    if (!typing) return;
    const fullLen = lesson.body.length;
    if (typedChars >= fullLen) { setTyping(false); return; }
    const speed = typedChars < 3 ? 80 : 12 + Math.random() * 18;
    const timer = setTimeout(() => setTypedChars(c => c + 1), speed);
    return () => clearTimeout(timer);
  }, [typing, typedChars, idx]);

  useEffect(() => { setTyping(true); setTypedChars(0); }, [idx]);

  function handleDone() {
    playClick();
    onDone(); setConfetti(true);
    setTimeout(() => setCheckDrawn(true), 100);
  }

  return (
    <div>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'0 20px', marginBottom:10}}>
        <div style={{display:'flex', alignItems:'center', gap:6}}>

        </div>
        <div style={{display:'flex', gap:5}}>
          {LESSONS.map((_,i) => (
            <div key={i} onClick={() => setIdx(i)} style={{width:i===idx?18:6, height:6, borderRadius:3, background:i===idx?P.lime:P.limeMid, transition:'all 0.3s ease', cursor:'pointer'}}/>
          ))}
        </div>
      </div>
      <div style={{margin:'0 14px', position:'relative', overflow:'hidden'}}>
        <Confetti active={confetti} onDone={() => setConfetti(false)}/>
        <div key={idx} style={{
          background: isDone ? `${P.lime}12` : P.card,
          border:`1.5px solid ${isDone ? P.lime+'55' : P.border}`,
          borderRadius:20, padding:'18px', transition:'all 0.4s ease',

            {typing && <span style={{display:'inline-block', width:2, height:14, background:P.lime, marginLeft:1, verticalAlign:'middle', animation:'typing-cursor 0.6s ease infinite'}}/>}
          </p>
          {idx===0 ? (
            isDone ? (
              <div style={{display:'flex', alignItems:'center', gap:8, borderTop:`1px solid ${P.rule}`, paddingTop:12}}>
                <svg width="18" height="18" viewBox="0 0 18 18">
                  <circle cx="9" cy="9" r="8" fill={P.lime} fillOpacity="0.15" stroke={P.lime} strokeWidth="1.5"/>
                  <path d="M5 9.5l3 3 5-6" stroke={P.lime} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                    strokeDasharray="14" strokeDashoffset={checkDrawn?0:14} style={{transition:'stroke-dashoffset 0.4s ease 0.1s'}}/>
                </svg>
                <span style={{fontSize:13, fontWeight:600, color:P.lime}}>{t('doneMsg',lang)} +{lesson.pts} eco points</span>
              </div>
            ) : (
              <button onClick={handleDone} style={{
                background:P.lime, color:dark?'#0a1a0e':'#fff', border:'none',
                borderRadius:10, padding:'9px 18px', fontFamily:'Plus Jakarta Sans,sans-serif',

  );

const QUIZ = [
  {q:'Almaty is surrounded by mountains. What does this do to air pollution?', opts:['Cleans the air naturally','Traps pollutants in a bowl','Has no effect','Pushes pollution away'], ans:1},
  {q:'Which of these is the smallest and most dangerous air particle?', opts:['PM10','Dust','PM2.5','Smoke'], ans:2},
  {q:'What time of day is Almaty\u2019s air usually cleanest in spring?', opts:['Early morning','After lunch','Late afternoon','Midnight'], ans:2},
];

function ChallengeScreen({ score, onScoreUp }) {
  const dark = useTheme();
  const lang = useLang();
  const P = dark ? DARK : LIGHT;
  const [qIdx, setQIdx] = useState(0);
  const [picked, setPicked] = useState(null);
  const [correct, setCorrect] = useState(0);
  const [done, setDone] = useState(false);
  const [confetti, setConfetti] = useState(false);

  function answer(i) {
    if (picked !== null) return;
    playClick();
    setPicked(i);
    const isRight = i === QUIZ[qIdx].ans;
    if (isRight) setCorrect(c=>c+1);
    setTimeout(() => {
      if (qIdx < QUIZ.length-1) { setQIdx(q=>q+1); setPicked(null); }
      else { setDone(true); setConfetti(true); if(isRight) onScoreUp(3); }
    }, 700);
  }

  if (done) {
    const pts = correct * 3;
    return (
      <div style={{padding:'30px 20px', display:'flex', flexDirection:'column', alignItems:'center', paddingBottom:90, position:'relative', animation:'tab-fade-in 0.3s ease both'}}>
        <Confetti active={confetti} onDone={()=>setConfetti(false)}/>
        <div style={{fontSize:60, marginBottom:16, animation:'badge-pop 0.6s ease both'}}>{correct===3?'🏆':correct>=2?'🌟':'💪'}</div>
        <div style={{fontFamily:'DM Serif Display,serif', fontSize:28, color:P.text, marginBottom:6, textAlign:'center'}}>
          {correct}/3 {t('correct',lang)}
        </div>
        <div style={{fontSize:14, color:P.textMid, textAlign:'center', marginBottom:24}}>
          {correct===3?'Perfect score! You\u2019re an eco expert.':correct>=2?'Great job! Keep learning.':'Good try! Read today\u2019s lesson to level up.'}
        </div>
        <div style={{
          background:`${P.lime}18`, border:`1.5px solid ${P.lime}44`,
          borderRadius:16, padding:'16px 24px', textAlign:'center', marginBottom:24,
        }}>
          <div style={{fontSize:11, letterSpacing:2, fontWeight:700, color:P.textDim, textTransform:'uppercase', marginBottom:4}}>{t('ptsEarned',lang)}</div>
          <div style={{fontFamily:'DM Serif Display,serif', fontSize:36, color:P.lime}}>+{pts}</div>
        </div>
        <button onClick={()=>{setQIdx(0);setPicked(null);setCorrect(0);setDone(false);}} style={{
          background:P.lime, color:dark?'#0a1a0e':'#fff', border:'none', borderRadius:12,
          padding:'12px 28px', fontFamily:'Plus Jakarta Sans,sans-serif', fontWeight:700, fontSize:14, cursor:'pointer',
        }}>{t('tryAgain',lang)}</button>
      </div>
    );
  }

  const q = QUIZ[qIdx];
  return (
    <div style={{padding:'20px 20px 90px', animation:'tab-fade-in 0.3s ease both'}}>
      <div style={{fontFamily:'DM Serif Display,serif', fontSize:22, color:P.text, marginBottom:4}}>{t('dailyChallenge',lang)}</div>
      <div style={{fontSize:12, color:P.textMid, marginBottom:20}}>{t('qDesc',lang)}</div>

      {/* Progress */}
      <div style={{display:'flex', gap:6, marginBottom:24}}>
        {QUIZ.map((_,i) => (
          <div key={i} style={{flex:1, height:4, borderRadius:2, background:i<=qIdx?P.lime:P.limeDim, transition:'background 0.3s ease'}}/>
        ))}
      </div>

      <div key={qIdx} style={{animation:'slide-in-right 0.28s ease both'}}>
        <div style={{
          background:P.card, border:`1px solid ${P.border}`, borderRadius:20,
          padding:'20px', marginBottom:14,
        }}>
          <div style={{fontSize:11, letterSpacing:2, fontWeight:700, color:P.lime, textTransform:'uppercase', marginBottom:10}}>{t('question',lang)} {qIdx+1}</div>
          <div style={{fontFamily:'DM Serif Display,serif', fontSize:19, color:P.text, lineHeight:1.4}}>{q.q}</div>
        </div>

        <div style={{display:'flex', flexDirection:'column', gap:8}}>
          {q.opts.map((opt,i) => {
            const isAns = i === q.ans;
            const isPicked = picked === i;
            let bg = P.card, border = P.border, color = P.text;
            if (picked !== null) {
              if (isAns) { bg=`#3a8c5018`; border='#3a8c5077'; color='#3a8c50'; }
              else if (isPicked) { bg='rgba(200,50,50,0.08)'; border='rgba(200,50,50,0.4)'; color='#b83030'; }
            }
            return (
              <button key={i} onClick={()=>answer(i)} style={{
                background:bg, border:`1.5px solid ${border}`, borderRadius:14,
                padding:'14px 18px', display:'flex', alignItems:'center', justifyContent:'space-between',
                cursor:'pointer', fontFamily:'Plus Jakarta Sans,sans-serif', transition:'all 0.2s ease',
                animation:`stagger-in 0.3s ease ${i*60}ms both`,
              }}>
                <span style={{fontSize:14, fontWeight:600, color}}>{opt}</span>
                {picked !== null && isAns && <span style={{fontSize:16}}>✓</span>}
                {picked !== null && isPicked && !isAns && <span style={{fontSize:16}}>✗</span>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

const STEPS = [
  {q:'How do you usually commute?',   icon:'🚶', key:'commute', opts:[{label:'Walk or cycle',pts:15},{label:'Public bus / Metro',pts:10},{label:'Carpool',pts:5},{label:'Drive alone',pts:0}]},
  {q:'How would you describe your diet?', icon:'🥗', key:'diet', opts:[{label:'Mostly plant-based',pts:15},{label:'Balanced',pts:10},{label:'Mostly meat',pts:3},{label:'Fast food heavy',pts:0}]},
  {q:'Do you sort your waste?',        icon:'♻️', key:'waste', opts:[{label:'Yes, always',pts:15},{label:'Sometimes',pts:8},{label:'Rarely',pts:3},{label:'Never',pts:0}]},
  {q:'How do you heat your home?',     icon:'🏠', key:'energy', opts:[{label:'Electric + solar',pts:15},{label:'District heating',pts:12},{label:'Gas boiler',pts:6},{label:'Coal stove',pts:0}]},
  {q:'Preferred weekend transport?',   icon:'🛴', key:'weekend', opts:[{label:'Walk or e-scooter',pts:15},{label:'Public transport',pts:10},{label:'Taxi / rideshare',pts:5},{label:'Own car',pts:0}]},
];
function Onboarding({ onDone }) {
  const dark = useTheme();
  const P = dark ? DARK : LIGHT;
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [picked, setPicked] = useState(null);
  const [totalPts, setTotalPts] = useState(0);
  const [dir, setDir] = useState(1);
  const s = STEPS[step];
  const isLast = step === STEPS.length-1;

  function pick(opt) {
    if (picked) return;
    setPicked(opt.label);
    setTimeout(() => {
      const tp = totalPts + opt.pts;
      setTotalPts(tp);
      const next = {...answers, [s.key]:opt};
      setAnswers(next);
      setPicked(null);
      if (isLast) onDone(next, tp);
      else { setDir(1); setStep(st=>st+1); }
    }, 350);
  }

  return (
    <div style={{padding:'60px 20px 40px', minHeight:'100%', display:'flex', flexDirection:'column', background:P.base}}>
      <div style={{fontFamily:'DM Serif Display,serif', fontSize:20, color:P.text, marginBottom:24, display:'flex', alignItems:'center', gap:8}}>
        <div style={{width:7,height:7,borderRadius:'50%',background:P.lime}}/>EcoAlmaty
      </div>

      <div style={{marginBottom:28}}>
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:8}}>
          <span style={{fontSize:11, color:P.textDim}}>{step+1} / {STEPS.length}</span>
          {step>0 && <button onClick={()=>{setDir(-1);setStep(s=>s-1);}} style={{background:'none',border:'none',fontSize:12,color:P.textMid,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif'}}>← Back</button>}
        </div>
        <div style={{height:3, background:P.rule, borderRadius:2}}>
          <div style={{height:'100%', borderRadius:2, background:P.lime, width:`${(step/STEPS.length)*100}%`, transition:'width 0.5s cubic-bezier(0.34,1.4,0.64,1)'}}/>
        </div>
      </div>

      {totalPts>0&&<div style={{display:'inline-flex',alignItems:'center',gap:5,background:P.limeDim,borderRadius:99,padding:'4px 12px',fontSize:11,fontWeight:700,color:P.lime,marginBottom:12,alignSelf:'flex-start',animation:'fade-in-quick 0.3s ease both'}}>+<FlipNum v={totalPts}/> pts so far</div>}

      <div key={step} style={{animation:dir>0?'slide-in-right 0.28s ease both':'slide-in-left 0.28s ease both'}}>
        <div style={{
          width:56,height:56,borderRadius:18,
          background:P.limeDim, border:`1px solid ${P.lime}44`,
          display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,marginBottom:16,
        }}>{s.icon}</div>
        <h2 style={{fontFamily:'DM Serif Display,serif', fontSize:24, color:P.text, lineHeight:1.3, marginBottom:6}}>{s.q}</h2>
        <p style={{fontSize:12, color:P.textDim, marginBottom:22}}>Tap to select</p>
        <div style={{display:'flex', flexDirection:'column', gap:8}}>
          {s.opts.map((opt,i) => {
            const isActive = picked===opt.label;
            return (
              <div key={opt.label} onClick={()=>pick(opt)} style={{
                position:'relative', overflow:'hidden',
                background:isActive?P.limeDim:P.card,
                border:`1.5px solid ${isActive?P.lime:P.border}`,
                borderRadius:14, padding:'14px 18px', cursor:'pointer',
                transition:'border-color 0.2s ease',
                animation:`stagger-in 0.3s ease ${i*65}ms both`,
              }}>
                <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', position:'relative', zIndex:1}}>
                  <span style={{fontSize:15, fontWeight:600, color:isActive?P.lime:P.text, transition:'color 0.2s ease', fontFamily:'Plus Jakarta Sans,sans-serif'}}>{opt.label}</span>
                  <span style={{fontSize:11, fontWeight:700, color:P.lime, opacity:0.7}}>+{opt.pts}</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function App() {
  const saved = JSON.parse(localStorage.getItem('ecoa4')||'{}');
  const [loading, setLoading] = useState(true);
  const [onboard, setOnboard] = useState(!saved.onboarded);
  const [tab, setTab] = useState(saved.tab||'today');
  const [aqi, setAqi] = useState(saved.aqi??140);
  const [score, setScore] = useState(saved.score??68);
  const [streak] = useState(saved.streak??4);
  const [lessonDone, setLessonDone] = useState(saved.lessonDone??false);
  const [dark, setDark] = useState(saved.dark??false);
  const [tweaks, setTweaks] = useState(false);
  const [showNotifs, setShowNotifs] = useState(false);
  const [lang, setLang] = useState(saved.lang||'en');
  const [liveSource, setLiveSource] = useState(false);
  const [showShare, setShowShare] = useState(false);

  const P = dark ? DARK : LIGHT;
  const meta = aqiMeta(aqi, lang);

  const persist = p => {
    const c = JSON.parse(localStorage.getItem('ecoa4')||'{}');
    localStorage.setItem('ecoa4', JSON.stringify({...c,...p}));
  };

  // Fetch real AQI data from Almaty
  useEffect(() => {
    fetch('https://api.waqi.info/feed/almaty/?token=demo')
      .then(r => r.json())
      .then(data => {
        if (data.status === 'ok' && data.data?.aqi) {
          const realAqi = Math.min(300, Math.max(0, data.data.aqi));
          setAqi(realAqi);
          setLiveSource(true);
          persist({aqi: realAqi});
        }
      })
      .catch(() => {/* fallback to default/saved AQI */});
  }, []);

  useEffect(() => {
    const h = e => {
      if(e.data?.type==='__activate_edit_mode') setTweaks(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaks(false);

    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',h);

  function toggleDark() { playClick(); const d=!dark; setDark(d); persist({dark:d}); }
  function cycleLang() { playClick(); const langs=['en','kz','ru']; const next=langs[(langs.indexOf(lang)+1)%3]; setLang(next); persist({lang:next}); }

                        <div style={{fontSize:12, color:P.lime, textAlign:'right'}}>{score}</div>
                      </div>
                      <button onClick={()=>{setDark(d=>!d);}} style={{background:P.limeDim, border:`1px solid ${P.lime}44`, borderRadius:8, padding:'7px', color:P.lime, fontSize:11, fontWeight:700, cursor:'pointer', fontFamily:'Plus Jakarta Sans,sans-serif'}}>{dark?'Switch to Light':'Switch to Dark'}</button>
                      <button onClick={()=>{setLessonDone(false); persist({lessonDone:false});}} style={{background:'none', border:`1px solid ${P.border}`, borderRadius:8, padding:'7px', color:P.textMid, fontSize:11, cursor:'pointer', fontFamily:'Plus Jakarta Sans,sans-serif'}}>Reset lesson</button>
                      <button onClick={()=>{localStorage.clear(); setOnboard(true); setLessonDone(false); setScore(68);}} style={{background:'none', border:`1px solid ${P.lime}55`, borderRadius:8, padding:'7px', color:P.lime, fontSize:11, fontWeight:700, cursor:'pointer', fontFamily:'Plus Jakarta Sans,sans-serif'}}>Restart onboarding</button>
                    </div>
                  </div>
                )}
                {/* Share overlay */}
                {showShare && <ShareOverlay aqi={aqi} dark={dark} onClose={()=>setShowShare(false)}/>}
              </>
            )}
          </div>
        </IOSDevice>
      </div>
    </LangCtx.Provider>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
<div id="root"></div>
</body>
</html>
